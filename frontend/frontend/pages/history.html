<!-- Page Header -->
<div class="page-header">
  <h1 class="page-title">Prediction History</h1>
</div>

<!-- Backtest Stats Card -->
<div class="backtest-stats glass-card" id="backtest-stats" style="padding: 20px; margin-bottom: 26px;">
  <div class="backtest-stats-row">
    <div>
      <div class="stat-label">MAE</div>
      <div id="hist-mae" class="stat-value" style="font-size: 1.4rem;">—</div>
    </div>
    <div>
      <div class="stat-label">RMSE</div>
      <div id="hist-rmse" class="stat-value" style="font-size: 1.4rem;">—</div>
    </div>
    <div>
      <div class="stat-label">Total Predictions</div>
      <div id="hist-count" class="stat-value" style="font-size: 1.4rem;">—</div>
    </div>
  </div>
</div>

<!-- History Table Card -->
<div class="glass-card" style="padding: 22px;">
  <div id="history-table" style="overflow-x: auto;">
    <table>
      <thead>
        <tr>
          <th data-col="prediction_date" style="cursor: pointer;">Prediction Date <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="target_date" style="cursor: pointer;">Target Date <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="predicted_price" style="cursor: pointer;">Predicted <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="actual_price" style="cursor: pointer;">Actual <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="error" style="cursor: pointer;">Error <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="confidence" style="cursor: pointer;">Confidence <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="trend" style="cursor: pointer;">Trend <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
          <th data-col="source" style="cursor: pointer;">Source <i class="fas fa-sort" style="font-size: 0.7rem; color: #6366f1;"></i></th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <!-- Rows injected by JS -->
      </tbody>
    </table>
  </div>
</div>
