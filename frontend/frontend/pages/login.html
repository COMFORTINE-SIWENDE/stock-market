<div style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 24px;">
  <div class="glass-card" style="max-width: 420px; width: 100%; margin: auto; padding: 32px;">

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 28px;">
      <i class="fas fa-chart-line" style="font-size: 2.5rem; color: #6366f1; margin-bottom: 12px; display: block;"></i>
      <h1 style="font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;">
        Market<span class="gradient-text">Mind AI</span>
      </h1>
      <p style="color: #9ca3af; margin-top: 6px; font-size: 0.9rem;">Sign in to your account</p>
    </div>

    <!-- Form -->
    <form id="login-form" autocomplete="off">
      <div>
        <label style="display: block; font-size: 0.85rem; color: #9ca3af; margin-bottom: 6px;" for="login-username">Username or email</label>
        <input
          id="login-username"
          name="username_or_email"
          type="text"
          placeholder="Username or email"
          style="width: 100%; background: #11131c; border: 1px solid #2d2f3e; border-radius: 12px; padding: 12px 16px; color: white; outline: none; font-family: 'Inter', sans-serif; font-size: 0.9rem; margin-bottom: 16px;"
        />
      </div>

      <div>
        <label style="display: block; font-size: 0.85rem; color: #9ca3af; margin-bottom: 6px;" for="login-password">Password</label>
        <div style="position: relative; margin-bottom: 24px;">
          <input
            id="login-password"
            name="password"
            type="password"
            placeholder="Password"
            style="width: 100%; background: #11131c; border: 1px solid #2d2f3e; border-radius: 12px; padding: 12px 48px 12px 16px; color: white; outline: none; font-family: 'Inter', sans-serif; font-size: 0.9rem;"
          />
          <button
            type="button"
            id="toggle-password"
            aria-label="Toggle password visibility"
            style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #9ca3af; cursor: pointer; font-size: 1rem; padding: 0;"
          >
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; font-size: 0.95rem;">
        Sign In
      </button>
    </form>

    <!-- Register link -->
    <p style="text-align: center; margin-top: 20px; color: #9ca3af; font-size: 0.85rem;">
      Don't have an account?
      <a href="#/register" style="color: #818cf8; text-decoration: none; font-weight: 600;">Register</a>
    </p>

  </div>
</div>
