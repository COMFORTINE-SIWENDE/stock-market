<!-- Page Header -->
<div class="page-header">
  <h1 class="page-title">Predictions</h1>
</div>

<!-- Dashboard Grid: 2 cards -->
<div class="dashboard-grid">

  <!-- Backtest / Model Performance Card -->
  <div id="backtest-card" class="glass-card" style="padding: 22px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="font-size: 1rem; font-weight: 700;"><i class="fas fa-flask"></i> Model Performance</h3>
      <button id="train-btn" class="btn-primary" style="padding: 10px 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
        <span class="spinner" id="train-spinner" style="display: none;"></span>
        <i class="fas fa-brain" id="train-icon"></i> Train Model
      </button>
    </div>
    <div class="backtest-stats" style="margin-top: 0;">
      <div class="backtest-stats-row">
        <div>
          <div class="stat-label">MAE</div>
          <div id="bt-mae" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
        <div>
          <div class="stat-label">RMSE</div>
          <div id="bt-rmse" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
        <div>
          <div class="stat-label">Predictions</div>
          <div id="bt-count" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scatter Chart Card -->
  <div class="glass-card" style="padding: 22px;">
    <div style="margin-bottom: 12px;">
      <h3 style="font-size: 1rem; font-weight: 700;"><i class="fas fa-circle-dot"></i> Confidence vs Price</h3>
    </div>
    <div class="chart-container">
      <canvas id="scatter-chart"></canvas>
    </div>
  </div>

</div>

<!-- Full-width Forecast Table -->
<div class="glass-card" style="padding: 22px;">
  <h3 style="margin-bottom: 18px; font-size: 1rem; font-weight: 700;">
    <i class="fas fa-table"></i> Forecast Table
  </h3>
  <div id="predictions-table" style="overflow-x: auto;">
    <!-- Table injected by JS -->
  </div>
</div>
