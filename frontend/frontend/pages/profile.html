<!-- Page Header -->
<div class="page-header">
  <h1 class="page-title">Profile</h1>
</div>

<!-- Profile Card -->
<div style="display: flex; justify-content: center; padding: 8px 0 40px;">
  <div class="glass-card" style="max-width: 500px; width: 100%; padding: 36px; text-align: center;">

    <!-- Avatar -->
    <div
      id="profile-avatar"
      style="
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        font-weight: 700;
        color: white;
        margin: 0 auto 16px;
        letter-spacing: 1px;
      "
    >—</div>

    <!-- Username -->
    <div id="profile-username" style="font-size: 1.4rem; font-weight: 700; margin-bottom: 6px;">—</div>

    <!-- Email -->
    <div id="profile-email" style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 6px;">—</div>

    <!-- Member since -->
    <div id="profile-created" style="color: #6b7280; font-size: 0.82rem; margin-bottom: 24px;">Member since —</div>

    <!-- Divider -->
    <hr style="border: none; border-top: 1px solid #2d2f3e; margin-bottom: 24px;" />

    <!-- Logout -->
    <button id="logout-btn" class="btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <i class="fas fa-sign-out-alt"></i> Log Out
    </button>

  </div>
</div>
