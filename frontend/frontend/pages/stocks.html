<!-- Page Header -->
<div class="page-header">
  <h1 class="page-title">Stocks</h1>
</div>

<!-- Dashboard Grid: 2 cards -->
<div class="dashboard-grid">

  <!-- Technical Indicators Card -->
  <div id="indicators-card" class="glass-card" style="padding: 22px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="font-size: 1rem; font-weight: 700;"><i class="fas fa-sliders"></i> Technical Indicators</h3>
      <button id="collect-btn" class="btn-primary" style="padding: 10px 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-download"></i> Collect Data
      </button>
    </div>
    <div class="backtest-stats" style="margin-top: 0;">
      <div class="backtest-stats-row">
        <div>
          <div class="stat-label">SMA 5</div>
          <div id="ind-sma5" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
        <div>
          <div class="stat-label">SMA 20</div>
          <div id="ind-sma20" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
        <div>
          <div class="stat-label">Volatility</div>
          <div id="ind-volatility" class="stat-value" style="font-size: 1.4rem;">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Price + Moving Averages Chart Card -->
  <div class="glass-card" style="padding: 22px;">
    <div style="margin-bottom: 12px;">
      <h3 style="font-size: 1rem; font-weight: 700;"><i class="fas fa-chart-line"></i> Price + Moving Averages</h3>
    </div>
    <div class="chart-container">
      <canvas id="stocks-chart"></canvas>
    </div>
  </div>

</div>

<!-- Full-width Historical Data Table -->
<div class="glass-card" style="padding: 22px;">
  <h3 style="margin-bottom: 18px; font-size: 1rem; font-weight: 700;">
    <i class="fas fa-table"></i> Historical Data
  </h3>
  <div id="stocks-table" style="overflow-x: auto;">
    <!-- Table injected by JS -->
  </div>
  <!-- Pagination -->
  <div id="pagination" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;">
    <!-- Pagination controls injected by JS -->
  </div>
</div>
