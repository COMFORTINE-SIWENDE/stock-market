<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Stock Predictor</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="../index.html" class="nav-brand">
        <span class="icon">📈</span>
        Stock Predictor
      </a>
      <ul class="nav-links">
        <li><a href="../index.html"><span class="icon">🏠</span> Home</a></li>
        <li><a href="login.html"><span class="icon">🔐</span> Login</a></li>
        <li><a href="register.html" class="active"><span class="icon">✨</span> Register</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="main-content">
      <div style="max-width: 500px; margin: 0 auto;">
        <div class="page-header text-center">
          <h1 class="page-title" style="justify-content: center;">
            <span class="icon">✨</span> Create Account
          </h1>
          <p class="page-subtitle">Join us and start predicting stock prices</p>
        </div>

        <!-- Alert Container -->
        <div id="alert-container"></div>

        <!-- Register Form -->
        <div class="card">
          <form id="register-form">
            <div class="form-group">
              <label class="form-label" for="email">
                <span class="icon">📧</span> Email
              </label>
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="your@email.com"
                required
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="username">
                <span class="icon">👤</span> Username
              </label>
              <input 
                type="text" 
                id="username" 
                class="form-input" 
                placeholder="Choose a username"
                required
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="full_name">
                <span class="icon">✍️</span> Full Name
              </label>
              <input 
                type="text" 
                id="full_name" 
                class="form-input" 
                placeholder="Your full name"
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="password">
                <span class="icon">🔒</span> Password
              </label>
              <input 
                type="password" 
                id="password" 
                class="form-input" 
                placeholder="Choose a strong password"
                required
                minlength="8"
              >
              <small style="opacity: 0.7; font-size: 0.875rem;">Minimum 8 characters</small>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm_password">
                <span class="icon">🔐</span> Confirm Password
              </label>
              <input 
                type="password" 
                id="confirm_password" 
                class="form-input" 
                placeholder="Confirm your password"
                required
              >
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;" id="register-btn">
              <span class="icon">🚀</span> Create Account
            </button>
          </form>

          <div class="card-footer text-center">
            <p>Already have an account? <a href="login.html" style="color: var(--button-primary); font-weight: 500;">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Stock Market Prediction System. All rights reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { api } from '../js/api.js';

    const form = document.getElementById('register-form');
    const alertContainer = document.getElementById('alert-container');
    const registerBtn = document.getElementById('register-btn');

    function showAlert(message, type = 'danger') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          <span class="icon">${type === 'success' ? '✅' : '❌'}</span>
          ${message}
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const fullName = document.getElementById('full_name').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      // Validation
      if (!email || !username || !password) {
        showAlert('Please fill in all required fields');
        return;
      }

      if (password.length < 8) {
        showAlert('Password must be at least 8 characters long');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<span class="spinner" style="width: 20px; height: 20px; margin: 0;"></span> Creating account...';

      try {
        await api.auth.register({
          email: email,
          username: username,
          password: password,
          full_name: fullName || username
        });

        showAlert('Account created successfully! Redirecting to login...', 'success');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        showAlert(error.message || 'Registration failed. Please try again.');
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<span class="icon">🚀</span> Create Account';
      }
    });
  </script>
</body>
</html>
